
<h2 class="sr-only">畑AIアドバイザー v2 — GPS天気連携・畑マップ・会話形式診断</h2>
<style>
#app { padding: 1.5rem 0; }
.tab-bar { display:flex; gap:4px; margin-bottom:1.5rem; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:4px; }
.tab-btn { flex:1; padding:8px; border:none; border-radius:6px; font-size:13px; cursor:pointer; background:transparent; color:var(--color-text-secondary); font-weight:400; transition:all 0.15s; }
.tab-btn.active { background:var(--color-background-primary); color:var(--color-text-primary); font-weight:500; border:0.5px solid var(--color-border-tertiary); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.card { background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:1rem 1.25rem; margin-bottom:1rem; }
.label { font-size:12px; color:var(--color-text-secondary); margin-bottom:6px; }
.weather-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px; }
.weather-card { background:var(--color-background-primary); border-radius:var(--border-radius-md); padding:10px; text-align:center; border:0.5px solid var(--color-border-tertiary); }
.weather-val { font-size:20px; font-weight:500; color:var(--color-text-primary); }
.weather-lbl { font-size:11px; color:var(--color-text-secondary); margin-top:2px; }
#map-grid { display:grid; gap:4px; margin-top:12px; }
.cell { border-radius:6px; border:1.5px dashed var(--color-border-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--color-text-secondary); transition:all 0.15s; min-height:52px; user-select:none; }
.cell:hover { border-color:var(--color-border-primary); background:var(--color-background-secondary); }
.cell.planted { border-style:solid; }
.chat-area { height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:4px 0; margin-bottom:12px; }
.msg { max-width:85%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.6; }
.msg.user { align-self:flex-end; background:var(--color-background-info); color:var(--color-text-primary); border-radius:12px 12px 2px 12px; }
.msg.ai { align-self:flex-start; background:var(--color-background-secondary); color:var(--color-text-primary); border-radius:12px 12px 12px 2px; border:0.5px solid var(--color-border-tertiary); }
.msg.ai.loading { color:var(--color-text-secondary); }
.chat-input-row { display:flex; gap:8px; }
.chat-input-row input { flex:1; font-size:14px; }
.chat-input-row button { padding:8px 16px; font-size:14px; border-radius:var(--border-radius-md); cursor:pointer; border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); color:var(--color-text-primary); white-space:nowrap; }
.quick-btns { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.quick-btn { font-size:12px; padding:5px 10px; border-radius:20px; border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); color:var(--color-text-secondary); cursor:pointer; }
.quick-btn:hover { border-color:var(--color-border-primary); color:var(--color-text-primary); }
#crop-picker { display:none; position:absolute; background:var(--color-background-primary); border:0.5px solid var(--color-border-primary); border-radius:var(--border-radius-md); padding:8px; z-index:10; box-shadow:none; max-width:240px; }
.crop-option { padding:6px 10px; cursor:pointer; border-radius:6px; font-size:13px; display:flex; align-items:center; gap:8px; }
.crop-option:hover { background:var(--color-background-secondary); }
</style>

<div id="app">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.5rem;">
    <i class="ti ti-plant-2" style="font-size:24px; color:var(--color-text-success);" aria-hidden="true"></i>
    <div>
      <div style="font-size:18px; font-weight:500;">畑AIアドバイザー</div>
      <div style="font-size:12px; color:var(--color-text-secondary);">GPS連携 · 畑マップ · AI相談</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('weather')"><i class="ti ti-cloud" aria-hidden="true"></i> 天気</button>
    <button class="tab-btn" onclick="switchTab('map')"><i class="ti ti-map" aria-hidden="true"></i> 畑マップ</button>
    <button class="tab-btn" onclick="switchTab('chat')"><i class="ti ti-message-2" aria-hidden="true"></i> AI相談</button>
  </div>

  <!-- 天気タブ -->
  <div id="tab-weather" class="tab-content active">
    <div class="card">
      <div class="label">現在地の天気を取得</div>
      <button onclick="getWeather()" style="width:100%; padding:10px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); cursor:pointer; font-size:14px; color:var(--color-text-primary);">
        <i class="ti ti-current-location" aria-hidden="true"></i>　GPSで現在地を取得する
      </button>
      <div id="weather-status" style="font-size:12px; color:var(--color-text-secondary); margin-top:8px; text-align:center;"></div>
    </div>
    <div id="weather-result" style="display:none;">
      <div class="card">
        <div style="font-size:14px; font-weight:500; margin-bottom:4px;" id="weather-location"></div>
        <div style="font-size:12px; color:var(--color-text-secondary);" id="weather-date"></div>
        <div class="weather-grid">
          <div class="weather-card">
            <div class="weather-val" id="w-temp">--</div>
            <div class="weather-lbl">気温 (°C)</div>
          </div>
          <div class="weather-card">
            <div class="weather-val" id="w-rain">--</div>
            <div class="weather-lbl">降水量 (mm)</div>
          </div>
          <div class="weather-card">
            <div class="weather-val" id="w-humid">--</div>
            <div class="weather-lbl">湿度 (%)</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="label">今後7日間の降水予報</div>
        <div id="forecast-bar" style="display:flex; gap:4px; align-items:flex-end; height:80px; margin-top:8px;"></div>
        <div id="forecast-labels" style="display:flex; gap:4px; margin-top:4px;"></div>
      </div>
      <div class="card" id="weather-advice-card">
        <div class="label"><i class="ti ti-bulb" aria-hidden="true"></i> 天気に基づくアドバイス</div>
        <div id="weather-advice" style="font-size:13px; color:var(--color-text-primary); line-height:1.7;"></div>
      </div>
    </div>
  </div>

  <!-- 畑マップタブ -->
  <div id="tab-map" class="tab-content">
    <div class="card">
      <div class="label">区画サイズ設定（縦 × 横）</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="number" id="grid-rows" value="4" min="2" max="8" style="width:60px; font-size:14px;" onchange="buildGrid()"/>
        <span style="color:var(--color-text-secondary);">×</span>
        <input type="number" id="grid-cols" value="5" min="2" max="8" style="width:60px; font-size:14px;" onchange="buildGrid()"/>
        <span style="font-size:12px; color:var(--color-text-secondary);">区画</span>
      </div>
    </div>
    <div class="card" style="position:relative;">
      <div class="label">区画をタップして作物を登録</div>
      <div id="map-grid"></div>
      <div id="crop-picker">
        <div style="font-size:11px; color:var(--color-text-secondary); padding:4px 10px 6px;">作物を選ぶ</div>
        <div class="crop-option" onclick="setCrop('🍅 トマト','#FFE4E1')">🍅 トマト</div>
        <div class="crop-option" onclick="setCrop('🍆 ナス','#E8D5F5')">🍆 ナス</div>
        <div class="crop-option" onclick="setCrop('🥒 キュウリ','#D5F5DA')">🥒 キュウリ</div>
        <div class="crop-option" onclick="setCrop('🌽 トウモロコシ','#FFF8D5')">🌽 トウモロコシ</div>
        <div class="crop-option" onclick="setCrop('🥬 レタス','#D5F5DA')">🥬 レタス</div>
        <div class="crop-option" onclick="setCrop('🧅 玉ねぎ','#FFF0D5')">🧅 玉ねぎ</div>
        <div class="crop-option" onclick="setCrop('🥕 にんじん','#FFE8D5')">🥕 にんじん</div>
        <div class="crop-option" onclick="setCrop('🌿 ハーブ','#D5F5E8')">🌿 ハーブ</div>
        <div class="crop-option" onclick="setCrop('🟫 未使用','#F0EDE8')">🟫 未使用</div>
        <div class="crop-option" onclick="setCrop('','')">✕ クリア</div>
      </div>
    </div>
    <div class="card">
      <div class="label">マップ概要</div>
      <div id="map-summary" style="font-size:13px; color:var(--color-text-secondary);">区画をタップして作物を登録してください</div>
    </div>
  </div>

  <!-- AI相談タブ -->
  <div id="tab-chat" class="tab-content">
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="padding:10px 14px; border-bottom:0.5px solid var(--color-border-tertiary);">
        <div style="font-size:13px; font-weight:500;">農業AIに何でも相談</div>
        <div style="font-size:11px; color:var(--color-text-secondary);">天気・マップ情報も自動で共有されます</div>
      </div>
      <div style="padding:12px;">
        <div class="chat-area" id="chat-area"></div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickSend('今週、雑草を抜くべきですか？')">雑草どうする？</button>
          <button class="quick-btn" onclick="quickSend('今から植えられるものは何ですか？')">何を植える？</button>
          <button class="quick-btn" onclick="quickSend('肥料はいつまくべきですか？')">肥料のタイミング</button>
          <button class="quick-btn" onclick="quickSend('水やりの頻度を教えてください')">水やり頻度</button>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="質問を入力..." onkeydown="if(event.key==='Enter')sendChat()" />
          <button onclick="sendChat()">送信 ↗</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let weatherData = null;
let gridData = {};
let chatHistory = [];
let selectedCell = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.closest('.tab-btn').classList.add('active');
  if (tab === 'map') buildGrid();
  if (tab === 'chat' && chatHistory.length === 0) initChat();
}

async function getWeather() {
  const status = document.getElementById('weather-status');
  status.textContent = 'GPS取得中...';
  if (!navigator.geolocation) { status.textContent = 'GPSが使えません'; return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude.toFixed(4);
    const lon = pos.coords.longitude.toFixed(4);
    status.textContent = `位置取得: ${lat}, ${lon} — 天気データ取得中...`;
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation&daily=precipitation_sum&forecast_days=7&timezone=Asia%2FTokyo`;
      const res = await fetch(url);
      const data = await res.json();
      weatherData = { lat, lon, data };
      renderWeather(data, lat, lon);
      status.textContent = '';
    } catch(e) {
      status.textContent = '天気データの取得に失敗しました';
    }
  }, () => { status.textContent = 'GPS許可が必要です'; });
}

function renderWeather(data, lat, lon) {
  const c = data.current;
  document.getElementById('w-temp').textContent = Math.round(c.temperature_2m);
  document.getElementById('w-rain').textContent = c.precipitation.toFixed(1);
  document.getElementById('w-humid').textContent = Math.round(c.relative_humidity_2m);
  document.getElementById('weather-location').textContent = `緯度 ${lat} / 経度 ${lon}`;
  document.getElementById('weather-date').textContent = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric', weekday:'short'});

  const daily = data.daily;
  const maxRain = Math.max(...daily.precipitation_sum, 1);
  const bar = document.getElementById('forecast-bar');
  const lbl = document.getElementById('forecast-labels');
  bar.innerHTML = ''; lbl.innerHTML = '';
  const days = ['日','月','火','水','木','金','土'];
  daily.precipitation_sum.forEach((r, i) => {
    const h = Math.max(8, Math.round((r / maxRain) * 72));
    const color = r > 5 ? '#378ADD' : r > 1 ? '#85B7EB' : '#D3D1C7';
    bar.innerHTML += `<div style="flex:1; background:${color}; border-radius:4px 4px 0 0; height:${h}px;" title="${r.toFixed(1)}mm"></div>`;
    const d = new Date(daily.time[i]);
    lbl.innerHTML += `<div style="flex:1; text-align:center; font-size:10px; color:var(--color-text-secondary);">${days[d.getDay()]}</div>`;
  });

  const totalRain = daily.precipitation_sum.reduce((a,b) => a+b, 0);
  const avgTemp = Math.round(c.temperature_2m);
  let advice = '';
  if (totalRain > 30) advice = '今週は雨が多めです。水やりは控えめにし、排水状況を確認しましょう。雑草は雨後に抜くと根ごと取れやすいです。';
  else if (totalRain < 5) advice = '今週は乾燥気味の予報です。朝か夕方に水やりをしっかり行いましょう。マルチングで保水するのも効果的です。';
  else advice = '今週の天気は農作業に適しています。土が湿っているうちに植え付けや施肥を行うと良いタイミングです。';
  if (avgTemp > 30) advice += ' 気温が高いため、作物の熱ストレスに注意してください。';
  if (avgTemp < 10) advice += ' 気温が低めです。霜の恐れがある場合は防寒対策を。';
  document.getElementById('weather-advice').textContent = advice;
  document.getElementById('weather-result').style.display = 'block';
}

function buildGrid() {
  const rows = parseInt(document.getElementById('grid-rows').value) || 4;
  const cols = parseInt(document.getElementById('grid-cols').value) || 5;
  const grid = document.getElementById('map-grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const key = `${r}-${c}`;
      const cell = document.createElement('div');
      cell.className = 'cell' + (gridData[key] ? ' planted' : '');
      cell.id = 'cell-' + key;
      if (gridData[key]) {
        cell.style.background = gridData[key].color;
        cell.style.borderColor = 'transparent';
        cell.textContent = gridData[key].name;
      }
      cell.onclick = (e) => openPicker(e, key);
      grid.appendChild(cell);
    }
  }
  updateMapSummary();
}

function openPicker(e, key) {
  selectedCell = key;
  const picker = document.getElementById('crop-picker');
  picker.style.display = 'block';
  picker.style.top = (e.target.offsetTop + e.target.offsetHeight + 4) + 'px';
  picker.style.left = '0px';
  e.stopPropagation();
}

document.addEventListener('click', () => {
  document.getElementById('crop-picker').style.display = 'none';
});

function setCrop(name, color) {
  if (!selectedCell) return;
  if (name) {
    gridData[selectedCell] = { name, color };
    const cell = document.getElementById('cell-' + selectedCell);
    cell.classList.add('planted');
    cell.style.background = color;
    cell.style.borderColor = 'transparent';
    cell.textContent = name;
  } else {
    delete gridData[selectedCell];
    const cell = document.getElementById('cell-' + selectedCell);
    cell.classList.remove('planted');
    cell.style.background = '';
    cell.style.borderColor = '';
    cell.textContent = '';
  }
  document.getElementById('crop-picker').style.display = 'none';
  updateMapSummary();
}

function updateMapSummary() {
  const counts = {};
  Object.values(gridData).forEach(d => {
    if (d.name && d.name !== '🟫 未使用') counts[d.name] = (counts[d.name] || 0) + 1;
  });
  const total = parseInt(document.getElementById('grid-rows').value) * parseInt(document.getElementById('grid-cols').value);
  const planted = Object.keys(gridData).filter(k => gridData[k].name && gridData[k].name !== '🟫 未使用').length;
  if (!planted) { document.getElementById('map-summary').textContent = '区画をタップして作物を登録してください'; return; }
  const list = Object.entries(counts).map(([k,v]) => `${k} × ${v}区画`).join('　');
  document.getElementById('map-summary').textContent = `全${total}区画中 ${planted}区画を登録済み — ${list}`;
}

function initChat() {
  const greeting = 'こんにちは！畑の状態について何でも聞いてください。天気データやマップ情報があれば自動で参考にします。';
  addMessage('ai', greeting);
  chatHistory.push({ role: 'assistant', content: greeting });
}

function getContext() {
  let ctx = '';
  if (weatherData) {
    const c = weatherData.data.current;
    ctx += `現在の天気: 気温${Math.round(c.temperature_2m)}°C、湿度${Math.round(c.relative_humidity_2m)}%、降水${c.precipitation}mm。`;
  }
  const crops = Object.values(gridData).filter(d => d.name && d.name !== '🟫 未使用').map(d => d.name);
  if (crops.length) ctx += ` 畑の作物: ${[...new Set(crops)].join('、')}。`;
  return ctx;
}

function addMessage(role, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function quickSend(text) {
  document.getElementById('chat-input').value = text;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  const loading = addMessage('ai', '考え中...');
  loading.classList.add('loading');

  const context = getContext();
  const systemPrompt = `あなたは小規模農業・家庭菜園の専門家AIです。${context ? '【現在の畑情報】' + context : ''}初心者に寄り添い、具体的で実践的なアドバイスをしてください。返答は3〜5文程度で簡潔に。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    loading.textContent = reply;
    loading.classList.remove('loading');
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    loading.textContent = 'エラーが発生しました。もう一度お試しください。';
    loading.classList.remove('loading');
    chatHistory.pop();
  }
}
</script>
